{% extends "project_management_app/base.html" %}

{% block title %}タスク更新{% endblock %}

{% block content %}
<h1>{{ object.title }}</h1>
<p>案件: {{ object.project.name }}</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">更新</button>
</form>

<br>

<a href="{% url 'my_tasks' %}">一覧へ戻る</a>
{% endblock %}
