<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>タスク更新</title>
</head>
<body>
    <h1>{{ object.title }}</h1>
    <p>案件: {{ object.project.name }}</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">更新</button>
    </form>

    <a href="{% url 'my_tasks' %}">一覧へ戻る</a>
</body>
</html>
