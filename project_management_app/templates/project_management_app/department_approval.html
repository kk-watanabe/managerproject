{% extends "project_management_app/base.html" %}
{% load humanize %}
{% block title %}一次承認{% endblock %}

{% block content %}
<h1>一次承認</h1>

<h2>{{ project.name }}</h2>
<p>{{ project.description }}</p>
<p>予算: {{ project.estimated_budget|intcomma }} 円</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">確定</button>
</form>
{% endblock %}
