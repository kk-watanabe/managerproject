{% extends "project_management_app/base.html" %}

{% block title %}通知一覧{% endblock %}

{% block content %}
    <h2>通知一覧</h2>

    <ul>
        {% for n in notifications %}
            <li>
                <p class="{% if not n.is_read %}unread-row{% endif %}">
                    {{ n.message }}
                    ({{ n.created_at }})
                </p>
            </li>
        {% endfor %}
    </ul>
{% endblock %}
