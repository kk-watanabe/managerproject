{% extends "project_management_app/base.html" %}

{% block title %}通知一覧{% endblock %}

{% block content %}
    <h1>通知一覧</h1>

    <ul>
        {% for notification in notifications %}
            <li>
                {{ notification.message }}
                ({{ notification.created_at }})
            </li>
        {% endfor %}
    </ul>
{% endblock %}
