<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}開発管理統合アプリ{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'project_management_app/base.css' %}">
</head>
<body>
    <header class="header">
        <h1>開発管理統合アプリ</h1>

        <nav>
            <a href="{% url 'home' %}">ホーム</a>
            <a href="{% url 'notifications' %}">通知</a>

            <form method="post" action="{% url 'logout' %}" class="logout-form">
                {% csrf_token %}
                <button type="submit" class="logout-link">ログアウト</button>
            </form>
        </nav>
    </header>

    <main class="container">
        {% if messages %}
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        {% endif %}
        
        {% block content %}{% endblock %}
    </main>
</body>
</html>
