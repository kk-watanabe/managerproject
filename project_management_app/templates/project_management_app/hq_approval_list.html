{% extends "project_management_app/base.html" %}

{% block title %}本部最終承認待ち{% endblock %}

{% block content %}
<h1>本部最終承認待ち</h1>

<ul>
    {% for project in projects %}
        <li>
            {{ project.name }}
            - {{ project.department.name }}
            <a href="{% url 'hq_approval' project.pk %}">
                最終承認
            </a>
        </li>
    {% endfor %}
</ul>
{% endblock %}
