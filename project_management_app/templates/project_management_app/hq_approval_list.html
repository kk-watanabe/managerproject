<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>本部承認一覧</title>
</head>
<body>
    <h1>本部最終承認待ち</h1>

    <ul>
        {% for project in projects %}
            <li>
                {{ project.name }}
                - {{ project.department.name }}
                <a href="{% url 'hq_approval' project.pk %}">
                    最終承認
                </a>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
